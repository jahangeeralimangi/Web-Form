<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Contact Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <h1>Contact Us</h1>
        <div class="social-buttons">
            <button class="social-btn google-btn" type="button">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="social-btn facebook-btn" type="button">
                <i class="fab fa-facebook-f"></i> Continue with Facebook
            </button>
            <button class="social-btn twitter-btn" type="button">
                <i class="fab fa-twitter"></i> Continue with Twitter
            </button>
        </div>
        <div class="divider">
            <span>or</span>
        </div>
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Enter your message" rows="4" required></textarea>

            <button type="submit">Submit</button>
        </form>
        <div id="form-response"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
